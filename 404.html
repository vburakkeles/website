  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;overflow-x:hidden}
  body{
    background:var(--navy-900);
    color:var(--ink);
    font-family:"Poppins",system-ui,sans-serif;
    line-height:1.6;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--amber);color:var(--navy-900)}
  a{color:inherit;text-decoration:none}
  .mono{font-family:"JetBrains Mono",monospace}
  .eyebrow{
    font-family:"JetBrains Mono",monospace;
    font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    color:var(--amber);font-weight:500;
    display:inline-flex;align-items:center;gap:.55rem;
  }
  .eyebrow::before{content:"";width:26px;height:1.5px;background:var(--amber);display:inline-block;opacity:.7}
  .wrap{max-width:var(--maxw);margin:0 auto;padding-left:clamp(18px,4vw,40px);padding-right:clamp(18px,4vw,40px)}
  section{position:relative}

  /* ---------- background dots / atmosphere ---------- */
  .bg-dots{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,.05) 1.4px,transparent 1.4px);
    background-size:34px 34px;
    mask-image:radial-gradient(circle at 50% 0%,#000 0%,transparent 78%);
  }
  .atmos{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
  .glow{position:absolute;border-radius:50%;filter:blur(120px);opacity:.4;pointer-events:none}
  .glow.a{width:520px;height:520px;background:var(--blue);top:-160px;right:-120px}
  .glow.b{width:420px;height:420px;background:var(--amber);bottom:10%;left:-180px;opacity:.16}

  /* ---------- nav ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:50;
    transition:background .4s var(--ease),border-color .4s,padding .4s;
    border-bottom:1px solid transparent;padding:18px 0;
  }
  header.scrolled{
    background:rgba(10,20,40,.78);backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);padding:12px 0;
  }
  .nav{display:flex;align-items:center;justify-content:space-between;gap:24px}
  .brand{display:flex;align-items:center;gap:11px;font-weight:700;letter-spacing:-.01em}
  .brand .logo{
    width:34px;height:34px;border-radius:50%;overflow:hidden;
    display:block;position:relative;flex:none;
  }
  /* avatar logo */
  .brand .logo img{width:100%;height:100%;object-fit:cover;display:block}
  .nav-links{display:flex;align-items:center;gap:6px}
  .nav-links a{
    font-size:.92rem;color:var(--muted);padding:8px 14px;border-radius:10px;
    transition:color .25s,background .25s;font-weight:500;
  }
  .nav-links a:hover{color:var(--ink);background:rgba(255,255,255,.05)}
  .btn{
    font-family:inherit;font-weight:600;font-size:.9rem;cursor:pointer;border:none;
    padding:11px 20px;border-radius:12px;display:inline-flex;align-items:center;gap:8px;
    transition:transform .25s var(--ease),box-shadow .3s,background .3s;
  }
  .btn-primary{background:var(--blue);color:#fff;box-shadow:0 8px 24px rgba(139,92,246,.4)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(139,92,246,.55)}
  .btn-ghost{background:rgba(255,255,255,.06);color:var(--ink);border:1px solid var(--line-2)}
  .btn-ghost:hover{transform:translateY(-2px);background:rgba(255,255,255,.1)}
  .menu-toggle{display:none;background:none;border:none;color:var(--ink);cursor:pointer;padding:6px}

  /* ---------- hero ---------- */
  .hero{padding-top:170px;padding-bottom:90px;position:relative;z-index:2}
  .hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:50px;align-items:center}
  .hero h1{
    font-size:clamp(2.6rem,6vw,4.6rem);line-height:1.02;font-weight:800;
    letter-spacing:-.03em;margin:22px 0 0;
  }
  .hero h1 .wave{display:inline-block;transform-origin:70% 70%;animation:wave 2.6s ease-in-out infinite}
  @keyframes wave{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(16deg)}20%{transform:rotate(-8deg)}30%{transform:rotate(14deg)}40%{transform:rotate(-4deg)}50%{transform:rotate(10deg)}}
  .hero h1 .name{color:var(--amber);position:relative;white-space:nowrap}
  .hero p.lead{font-size:1.08rem;color:var(--muted);max-width:30em;margin:22px 0 0}
  .hero p.lead b{color:var(--ink);font-weight:600}
  .tags{display:flex;flex-wrap:wrap;gap:10px;margin-top:26px}
  .pill{
    font-size:.8rem;font-weight:500;padding:7px 14px;border-radius:999px;
    background:rgba(255,255,255,.05);border:1px solid var(--line-2);color:var(--ink);
    display:inline-flex;align-items:center;gap:7px;
  }
  .pill .dot{width:6px;height:6px;border-radius:50%;background:var(--amber)}
  .hero-cta{display:flex;gap:14px;margin-top:34px;flex-wrap:wrap}

  /* pacman hero panel */
  .hero-visual{
    position:relative;border-radius:var(--radius);padding:34px;
    background:linear-gradient(160deg,var(--navy-700),var(--navy-850));
    border:1px solid var(--line);overflow:hidden;min-height:340px;
    display:flex;flex-direction:column;justify-content:space-between;
    box-shadow:0 30px 70px rgba(0,0,0,.35);
  }
  .hero-visual .grid-lines{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:40px 40px;opacity:.5}
  .maze{position:relative;display:flex;align-items:center;gap:14px;height:60px;z-index:2}
  /* ---------- hero portrait (drawn-in) ---------- */
  .portrait{position:relative;align-self:center;width:230px;max-width:82%;height:232px;margin:2px 0 8px;z-index:2;
    -webkit-mask:radial-gradient(78% 84% at 50% 42%,#000 56%,transparent 100%);mask:radial-gradient(78% 84% at 50% 42%,#000 56%,transparent 100%);
    animation:floaty 5.5s ease-in-out 3.4s infinite}
  .portrait .layer{position:absolute;inset:0;background:var(--me) center/contain no-repeat}
  .portrait .ghost{filter:grayscale(1) brightness(.5) contrast(1.15);opacity:.26}
  .portrait .real{clip-path:inset(0 0 0 0);animation:drawin 3s var(--ease) .3s forwards}
  .portrait .pen{position:absolute;left:7%;right:7%;top:0;height:2px;z-index:3;border-radius:2px;
    background:linear-gradient(90deg,transparent,var(--amber) 28%,var(--amber) 72%,transparent);
    box-shadow:0 0 14px 2px rgba(255,200,61,.65);opacity:0;animation:penmove 3s var(--ease) .3s forwards}
  .portrait .scan{position:absolute;inset:0;z-index:3;pointer-events:none;
    background:linear-gradient(115deg,transparent 42%,rgba(255,255,255,.13) 50%,transparent 58%);
    transform:translateX(-130%);animation:scanpass 6s ease-in-out 4.2s infinite}
  @keyframes drawin{0%{clip-path:inset(0 0 100% 0)}100%{clip-path:inset(0 0 0% 0)}}
  @keyframes penmove{0%{top:0;opacity:0}6%{opacity:1}94%{opacity:1}100%{top:100%;opacity:0}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes scanpass{0%,72%{transform:translateX(-130%)}86%{transform:translateX(130%)}100%{transform:translateX(130%)}}
  .pacman{
    width:54px;height:54px;flex:none;position:relative;filter:drop-shadow(0 0 14px rgba(255,200,61,.5));
  }
  .pacman::before,.pacman::after{
    content:"";position:absolute;left:0;width:54px;height:27px;background:var(--amber);
  }
  .pacman::before{top:0;border-radius:54px 54px 4px 4px;transform-origin:50% 100%;animation:chompT .45s ease-in-out infinite}
  .pacman::after{bottom:0;border-radius:4px 4px 54px 54px;transform-origin:50% 0;animation:chompB .45s ease-in-out infinite}
  @keyframes chompT{0%,100%{transform:rotate(-34deg)}50%{transform:rotate(0)}}
  @keyframes chompB{0%,100%{transform:rotate(34deg)}50%{transform:rotate(0)}}
  .dots{display:flex;gap:16px;align-items:center}
  .dots i{width:11px;height:11px;border-radius:50%;background:var(--blue-400);box-shadow:0 0 10px rgba(167,139,250,.6);animation:eat 3.6s linear infinite}
  .dots i:nth-child(1){animation-delay:0s}
  .dots i:nth-child(2){animation-delay:.45s}
  .dots i:nth-child(3){animation-delay:.9s}
  .dots i:nth-child(4){animation-delay:1.35s}
  .dots i:nth-child(5){animation-delay:1.8s}
  .dots i:nth-child(6){animation-delay:2.25s}
  @keyframes eat{0%,8%{transform:scale(1);opacity:1}12%,100%{transform:scale(0);opacity:0}}
  .hv-meta{position:relative;z-index:2}
  .hv-meta .row{display:flex;justify-content:space-between;padding:13px 0;border-top:1px solid var(--line);font-size:.84rem}
  .hv-meta .row span:first-child{color:var(--muted-2);font-family:"JetBrains Mono",monospace}
  .hv-meta .row span:last-child{font-weight:600}
  .hv-tag{position:absolute;top:22px;right:22px;z-index:3;font-size:.7rem;letter-spacing:.18em;color:var(--muted-2);font-family:"JetBrains Mono",monospace;text-transform:uppercase}

  /* ---------- stats strip ---------- */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);
    border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;margin:30px 0 0;z-index:2;position:relative}
  .stat{background:var(--navy-850);padding:30px 26px;transition:background .35s}
  .stat:hover{background:var(--navy-700)}
  .stat .num{font-size:2.4rem;font-weight:800;letter-spacing:-.02em;color:var(--amber);line-height:1}
  .stat .lab{font-size:.84rem;color:var(--muted);margin-top:8px}

  /* ---------- section heading ---------- */
  .sec{padding-top:100px;padding-bottom:100px}
  .sec-head{max-width:620px;margin-bottom:46px}
  .sec-head h2{font-size:clamp(2rem,4.4vw,3rem);font-weight:800;letter-spacing:-.025em;line-height:1.08;margin:16px 0 0}
  .sec-head p{color:var(--muted);margin-top:14px;font-size:1.02rem}

  /* ---------- work grid ---------- */
  .work-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .work-all{display:flex;justify-content:center;margin-top:40px}
  .card{
    background:var(--navy-800);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;cursor:pointer;position:relative;
    transition:transform .4s var(--ease),border-color .4s,box-shadow .4s;
  }
  .card:hover{transform:translateY(-6px);border-color:var(--line-2);box-shadow:0 26px 50px rgba(0,0,0,.4)}
  .card:focus-visible{outline:2px solid var(--amber);outline-offset:3px}
  .ph{
    aspect-ratio:16/10;position:relative;overflow:hidden;
    background:
      radial-gradient(120% 120% at 0% 0%,rgba(139,92,246,.32),transparent 55%),
      radial-gradient(120% 120% at 100% 100%,rgba(255,200,61,.22),transparent 55%),
      var(--navy-700);
    display:grid;place-items:center;
  }
  .ph::after{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:32px 32px;opacity:.6}
  .ph .ph-ic{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--muted);transition:transform .5s var(--ease)}
  .card:hover .ph .ph-ic{transform:scale(1.08)}
  .ph .ph-ic svg{width:38px;height:38px;opacity:.55}
  .ph .ph-ic span{font-family:"JetBrains Mono",monospace;font-size:.66rem;letter-spacing:.18em;text-transform:uppercase}
  .ph .idx{position:absolute;top:16px;left:18px;z-index:2;font-family:"JetBrains Mono",monospace;font-size:.8rem;color:var(--muted-2)}
  .ph .arrow{position:absolute;top:14px;right:16px;z-index:2;width:38px;height:38px;border-radius:50%;
    background:var(--amber);display:grid;place-items:center;color:var(--navy-900);
    transform:translate(8px,-8px) scale(.6);opacity:0;transition:all .4s var(--ease)}
  .card:hover .arrow{transform:none;opacity:1}
  .card-body{padding:22px 24px 24px}
  .card-body h3{font-size:1.25rem;font-weight:700;letter-spacing:-.01em}
  .card-body .cat{font-size:.82rem;color:var(--amber);font-weight:500;margin-top:2px}
  .card-tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .card-tags .t{font-size:.72rem;color:var(--muted);background:rgba(255,255,255,.04);border:1px solid var(--line);padding:4px 10px;border-radius:999px}

  /* ---------- about ---------- */
  .about-grid{display:grid;grid-template-columns:1fr 1fr;gap:54px;align-items:start}
  .about-copy p{color:var(--muted);margin-bottom:16px}
  .about-copy p b{color:var(--ink);font-weight:600}
  .timeline{position:relative}
  .timeline::before{content:"";position:absolute;left:25px;top:24px;bottom:24px;width:2px;background:linear-gradient(var(--blue),transparent);z-index:0}
  .tl-item{position:relative;display:flex;align-items:center;gap:16px;padding-bottom:24px}
  .tl-item:last-child{padding-bottom:0}
  .tl-logo{position:relative;z-index:1;flex:none;width:52px;height:52px;border-radius:13px;display:grid;place-items:center;border:1px solid var(--line);background:var(--navy-800);color:var(--muted-2);opacity:.92;transition:color .3s var(--ease),opacity .3s,border-color .3s,transform .3s var(--ease)}
  .tl-item:hover .tl-logo{color:var(--ink);opacity:1;border-color:var(--line-2);transform:translateY(-2px)}
  .tl-logo svg{width:30px;height:30px}
  .tl-text{display:flex;flex-direction:column}
  .tl-item .yr{font-family:"JetBrains Mono",monospace;font-size:.74rem;color:var(--amber);letter-spacing:.08em}
  .tl-item h4{font-size:1.02rem;font-weight:600;margin-top:2px}
  .tl-item span{color:var(--muted-2);font-size:.88rem}

  /* ---------- certificates ---------- */
  .cert-band{background:var(--navy-850);border:1px solid var(--line);border-radius:var(--radius);padding:44px;position:relative;overflow:hidden}
  .cert-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:40px;align-items:center}
  .cert-logos{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}
  .cert-logos .lg{font-size:.78rem;color:var(--muted);padding:8px 14px;border:1px solid var(--line);border-radius:10px;background:rgba(255,255,255,.03)}
  .cert-stat{text-align:center;padding:24px;border:1px dashed var(--line-2);border-radius:var(--radius-sm)}
  .cert-stat .big{font-size:3.4rem;font-weight:800;color:var(--amber);line-height:1}
  .cert-stat .sub{color:var(--muted);margin-top:6px;font-size:.92rem}
  .cert-shots{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:24px}
  .cert-shot{
    aspect-ratio:4/3;border-radius:var(--radius-sm);overflow:hidden;position:relative;cursor:pointer;
    background:
      radial-gradient(120% 120% at 0% 0%,rgba(139,92,246,.26),transparent 55%),
      radial-gradient(120% 120% at 100% 100%,rgba(255,200,61,.18),transparent 55%),
      var(--navy-700);
    border:1px solid var(--line);display:grid;place-items:center;
    transition:transform .4s var(--ease),border-color .4s,box-shadow .4s;
  }
  .cert-shot:focus-visible{outline:2px solid var(--blue);outline-offset:3px}
  .cert-shot .expand{position:absolute;top:10px;right:10px;z-index:3;width:30px;height:30px;border-radius:8px;
    background:rgba(7,6,16,.6);display:grid;place-items:center;color:var(--ink);opacity:0;transform:scale(.7);
    transition:all .35s var(--ease)}
  .cert-shot:hover .expand{opacity:1;transform:none}

  /* ---------- lightbox ---------- */
  .lightbox{position:fixed;inset:0;z-index:140;display:none;align-items:center;justify-content:center;padding:32px 20px}
  .lightbox.open{display:flex}
  .lb-bg{position:fixed;inset:0;background:rgba(4,3,10,.85);backdrop-filter:blur(10px);animation:fade .3s}
  .lb-card{position:relative;z-index:2;max-width:880px;width:100%;animation:rise .45s var(--ease)}
  .lb-stage{
    width:100%;border-radius:var(--radius);overflow:hidden;border:1px solid var(--line-2);
    background:var(--navy-800);box-shadow:0 34px 90px rgba(0,0,0,.6);
    display:grid;place-items:center;min-height:300px;
  }
  .lb-stage img{width:100%;height:auto;max-height:80vh;object-fit:contain;display:block}
  .lb-ph{
    width:100%;aspect-ratio:4/3;max-height:78vh;position:relative;display:grid;place-items:center;
    background:
      radial-gradient(120% 120% at 0% 0%,rgba(139,92,246,.3),transparent 55%),
      radial-gradient(120% 120% at 100% 100%,rgba(255,200,61,.2),transparent 55%),var(--navy-700);
  }
  .lb-ph::after{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:40px 40px;opacity:.5}
  .lb-ph .ph-ic{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--muted)}
  .lb-ph .ph-ic svg{width:46px;height:46px;opacity:.5}
  .lb-ph .ph-ic span{font-family:"JetBrains Mono",monospace;font-size:.74rem;letter-spacing:.2em;text-transform:uppercase}
  .lb-close{position:absolute;top:-14px;right:-14px;z-index:5;width:42px;height:42px;border-radius:50%;border:none;
    background:var(--navy-700);color:var(--ink);cursor:pointer;display:grid;place-items:center;
    box-shadow:0 8px 22px rgba(0,0,0,.5);transition:background .25s,transform .25s}
  .lb-close:hover{background:var(--blue);color:#fff;transform:rotate(90deg)}
  @media(max-width:560px){.lb-close{top:8px;right:8px}}
  .cert-shot:hover{transform:translateY(-4px);border-color:var(--line-2);box-shadow:0 18px 38px rgba(0,0,0,.35)}
  .cert-shot::after{content:"";position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:28px 28px;opacity:.55}
  .cert-shot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .cert-shot .ph-ic{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--muted)}
  .cert-shot .ph-ic svg{width:30px;height:30px;opacity:.5}
  .cert-shot .ph-ic span{font-family:"JetBrains Mono",monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase}
  .req{color:var(--amber);margin-left:2px}

  /* ---------- tools strip ---------- */
  .tools{padding-top:48px;padding-bottom:48px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .tools .eyebrow{display:flex;justify-content:center;margin-bottom:30px}
  .tools-row{display:flex;align-items:center;justify-content:space-between;gap:30px;flex-wrap:wrap}
  .tool{display:flex;align-items:center;gap:11px;color:var(--muted-2);opacity:.75;transition:color .3s var(--ease),opacity .3s,transform .3s var(--ease)}
  .tool:hover{color:var(--ink);opacity:1;transform:translateY(-3px)}
  .tool svg{height:44px;width:auto;flex:none}
  .tool .wm{font-weight:600;font-size:1.06rem;letter-spacing:-.01em}
  .tool .wm small{font-weight:600;opacity:.85}
  .tool .badge{width:30px;height:30px;border-radius:8px;background:currentColor;display:grid;place-items:center;flex:none}
  .tool .badge b{color:var(--navy-900);font-weight:800;font-size:.78rem;line-height:1}
  @media(max-width:760px){.tools-row{justify-content:center;gap:28px 34px}}

  /* ---------- contact ---------- */
  .contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px}
  .contact-info h2{font-size:clamp(2rem,4.4vw,3rem);font-weight:800;letter-spacing:-.025em;line-height:1.05}
  .contact-info .amber{color:var(--amber)}
  .contact-info p{color:var(--muted);margin:16px 0 26px;max-width:30em}
  .contact-list{display:flex;flex-direction:column;gap:12px}
  .ci-row{display:flex;align-items:center;gap:14px;padding:14px 16px;border:1px solid var(--line);border-radius:var(--radius-sm);background:var(--navy-850);transition:border-color .3s,transform .3s}
  .ci-row:hover{border-color:var(--amber);transform:translateX(4px)}
  .ci-row .ic{width:40px;height:40px;border-radius:10px;background:rgba(139,92,246,.16);display:grid;place-items:center;flex:none;color:var(--blue-400)}
  .ci-row .meta small{display:block;color:var(--muted-2);font-size:.74rem;font-family:"JetBrains Mono",monospace;letter-spacing:.06em}
  .ci-row .meta span{font-weight:600;font-size:.95rem}
  form{background:var(--navy-850);border:1px solid var(--line);border-radius:var(--radius);padding:30px}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:.82rem;color:var(--muted);margin-bottom:8px;font-weight:500}
  .field input,.field textarea{
    width:100%;background:var(--navy-900);border:1px solid var(--line-2);border-radius:12px;
    padding:13px 15px;color:var(--ink);font-family:inherit;font-size:.95rem;transition:border-color .25s,box-shadow .25s;
  }
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(139,92,246,.18)}
  .field textarea{resize:vertical;min-height:120px}
  form .btn-primary{width:100%;justify-content:center;margin-top:6px}
  .form-note{font-size:.8rem;color:var(--muted-2);text-align:center;margin-top:14px}

  /* ---------- success card ---------- */
  .success{position:fixed;inset:0;z-index:130;display:none;align-items:center;justify-content:center;padding:24px}
  .success.open{display:flex}
  .success .sbg{position:fixed;inset:0;background:rgba(4,3,10,.8);backdrop-filter:blur(8px);animation:fade .3s}
  .success-card{
    position:relative;z-index:2;background:var(--navy-800);border:1px solid var(--line-2);
    border-radius:var(--radius);padding:42px 38px 30px;text-align:center;max-width:390px;width:100%;
    box-shadow:0 34px 80px rgba(0,0,0,.55);animation:rise .5s var(--ease);
  }
  .success-card .check{
    width:74px;height:74px;border-radius:50%;margin:0 auto 22px;display:grid;place-items:center;
    background:rgba(139,92,246,.16);border:1px solid var(--blue);color:var(--blue-400);
  }
  .success-card .check svg{width:36px;height:36px;animation:pop .5s var(--ease) .15s both}
  @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
  .success-card h4{font-size:1.5rem;font-weight:800;letter-spacing:-.02em}
  .success-card p{color:var(--muted);margin-top:8px;font-size:.95rem}
  .success-card .bar{height:3px;border-radius:3px;background:var(--line);margin-top:24px;overflow:hidden}
  .success-card .bar i{display:block;height:100%;width:100%;background:var(--blue);transform-origin:left}
  @keyframes drain{from{transform:scaleX(1)}to{transform:scaleX(0)}}

  /* ---------- footer ---------- */
  footer{border-top:1px solid var(--line);padding:40px 0;margin-top:90px;position:relative;z-index:2}
  .foot{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap}
  .foot .socials{display:flex;gap:10px}
  .foot .socials a{width:40px;height:40px;border-radius:11px;border:1px solid var(--line-2);display:grid;place-items:center;color:var(--muted);transition:all .3s}
  .foot .socials a:hover{color:var(--navy-900);background:var(--amber);border-color:var(--amber);transform:translateY(-3px)}
  .foot small{color:var(--muted-2);font-size:.84rem}

  /* ---------- detail panel ---------- */
  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes rise{from{opacity:0;transform:translateY(30px) scale(.98)}to{opacity:1;transform:none}}
  .detail{position:fixed;inset:0;z-index:100;background:var(--navy-900);display:none;overflow-y:auto;overflow-x:hidden}
  .detail.open{display:block;animation:fade .35s}
  .detail .bg-dots{position:absolute}
  .dt-top{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:16px;
    padding:14px 0;background:rgba(7,6,16,.78);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
  .dt-back{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:.9rem;color:var(--ink);
    background:rgba(255,255,255,.06);border:1px solid var(--line-2);padding:9px 16px;border-radius:11px;cursor:pointer;
    font-family:inherit;transition:transform .25s var(--ease),background .25s}
  .dt-back:hover{transform:translateX(-3px);background:rgba(255,255,255,.1)}
  .dt-top .name{font-weight:700;letter-spacing:-.01em;font-size:.95rem;color:var(--muted)}
  .dt-top .name b{color:var(--ink)}

  .dt-wrap{max-width:980px;margin:0 auto;padding-left:clamp(18px,4vw,40px);padding-right:clamp(18px,4vw,40px);position:relative;z-index:2}
  .dt-hero{padding:60px 0 38px}
  .dt-eyebrow{font-family:"JetBrains Mono",monospace;font-size:.74rem;letter-spacing:.18em;text-transform:uppercase;color:var(--amber)}
  .dt-hero h1{font-size:clamp(2.4rem,6vw,4rem);font-weight:800;letter-spacing:-.03em;line-height:1.02;margin:16px 0}
  .dt-hero .lead{font-size:1.15rem;color:var(--muted);max-width:34em}
  .dt-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);
    border-radius:var(--radius);overflow:hidden;margin-top:34px}
  .dt-meta .m{background:var(--navy-850);padding:18px 20px}
